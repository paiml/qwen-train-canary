  - instruction: "Write a Python function to implement Dijkstra's shortest path."
    response: |
      import heapq

      def dijkstra(graph: dict, start: str) -> dict:
          dist = {node: float('inf') for node in graph}
          dist[start] = 0
          pq = [(0, start)]
          while pq:
              d, u = heapq.heappop(pq)
              if d > dist[u]:
                  continue
              for v, w in graph[u]:
                  if dist[u] + w < dist[v]:
                      dist[v] = dist[u] + w
                      heapq.heappush(pq, (dist[v], v))
          return dist

