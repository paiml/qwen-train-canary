      fn merge_sorted(a: &[i32], b: &[i32]) -> Vec<i32> {
          let mut result = Vec::with_capacity(a.len() + b.len());
          let (mut i, mut j) = (0, 0);
          while i < a.len() && j < b.len() {
              if a[i] <= b[j] {
                  result.push(a[i]);
                  i += 1;
              } else {
                  result.push(b[j]);
                  j += 1;
              }
          }
          result.extend_from_slice(&a[i..]);
          result.extend_from_slice(&b[j..]);
          result
      }

  - instruction: "Write a Python function to implement topological sort."
    response: |
      def topological_sort(graph: dict[str, list[str]]) -> list[str]:
          visited = set()
          result = []

          def dfs(node):
              if node in visited:
                  return
              visited.add(node)
              for neighbor in graph.get(node, []):
                  dfs(neighbor)
              result.append(node)

          for node in graph:
              dfs(node)
          return result[::-1]

  - instruction: "Write a Python function that implements a rate limiter."
    response: |
      import time
      from collections import deque

      class RateLimiter:
          def __init__(self, max_calls: int, period: float):
              self.max_calls = max_calls
              self.period = period
              self.calls = deque()

          def allow(self) -> bool:
              now = time.monotonic()
              while self.calls and self.calls[0] < now - self.period:
                  self.calls.popleft()
              if len(self.calls) < self.max_calls:
                  self.calls.append(now)
                  return True
              return False

  - instruction: "Write a Python function to implement a bloom filter."
    response: |
      import hashlib

      class BloomFilter:
          def __init__(self, size: int = 1000, num_hashes: int = 3):
              self.size = size
              self.num_hashes = num_hashes
              self.bits = [False] * size

          def _hashes(self, item: str) -> list[int]:
              result = []
              for i in range(self.num_hashes):
                  h = hashlib.sha256(f"{item}{i}".encode()).hexdigest()
                  result.append(int(h, 16) % self.size)
              return result

          def add(self, item: str):
              for h in self._hashes(item):
                  self.bits[h] = True

          def might_contain(self, item: str) -> bool:
              return all(self.bits[h] for h in self._hashes(item))

