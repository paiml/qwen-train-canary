  - instruction: "Write a Python decorator that retries a function on failure."
    response: |
      import functools
      import time

      def retry(max_attempts: int = 3, delay: float = 1.0):
          def decorator(func):
              @functools.wraps(func)
              def wrapper(*args, **kwargs):
                  for attempt in range(max_attempts):
                      try:
                          return func(*args, **kwargs)
                      except Exception:
                          if attempt == max_attempts - 1:
                              raise
                          time.sleep(delay)
              return wrapper
          return decorator

  - instruction: "Write a Python function to compute the edit distance between two strings."
    response: |
      def edit_distance(a: str, b: str) -> int:
          m, n = len(a), len(b)
          dp = [[0] * (n + 1) for _ in range(m + 1)]
          for i in range(m + 1):
              dp[i][0] = i
          for j in range(n + 1):
              dp[0][j] = j
          for i in range(1, m + 1):
              for j in range(1, n + 1):
                  if a[i-1] == b[j-1]:
                      dp[i][j] = dp[i-1][j-1]
                  else:
                      dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])
          return dp[m][n]

