      def lcs(a: str, b: str) -> str:
          m, n = len(a), len(b)
          dp = [[""] * (n + 1) for _ in range(m + 1)]
          for i in range(1, m + 1):
              for j in range(1, n + 1):
                  if a[i-1] == b[j-1]:
                      dp[i][j] = dp[i-1][j-1] + a[i-1]
                  else:
                      dp[i][j] = max(dp[i-1][j], dp[i][j-1], key=len)
          return dp[m][n]

