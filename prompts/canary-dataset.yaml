      class TrieNode:
          def __init__(self):
              self.children = {}
              self.is_end = False

      class Trie:
          def __init__(self):
              self.root = TrieNode()

          def insert(self, word: str):
              node = self.root
              for ch in word:
                  if ch not in node.children:
                      node.children[ch] = TrieNode()
                  node = node.children[ch]
              node.is_end = True

          def search(self, word: str) -> bool:
              node = self.root
              for ch in word:
                  if ch not in node.children:
                      return False
                  node = node.children[ch]
              return node.is_end

  - instruction: "Write a Python function to find all subsets that sum to a target."
    response: |
      def subset_sum(nums: list[int], target: int) -> list[list[int]]:
          result = []
          def backtrack(start, current, total):
              if total == target:
                  result.append(current[:])
                  return
              for i in range(start, len(nums)):
                  if total + nums[i] > target:
                      break
                  current.append(nums[i])
                  backtrack(i + 1, current, total + nums[i])
                  current.pop()
          nums.sort()
          backtrack(0, [], 0)
          return result

