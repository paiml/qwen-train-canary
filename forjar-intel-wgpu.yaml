version: "1.0"
name: qwen-train-canary-intel-wgpu
description: "Deploy WGPU training canary to intel (Radeon Pro W5700X)"

machines:
  intel:
    hostname: intel
    addr: 192.168.50.100
    user: noah
    arch: x86_64
    transport: ssh

resources:
  # --- Directory structure ---
  canary-dirs:
    type: file
    machine: intel
    state: directory
    path: /home/noah/qwen-train-canary/canaries

  wgpu-dir:
    type: file
    machine: intel
    state: directory
    path: /home/noah/qwen-train-canary/canaries/wgpu
    depends_on: [canary-dirs]

  prompts-dir:
    type: file
    machine: intel
    state: directory
    path: /home/noah/qwen-train-canary/prompts

  # --- Files ---
  wgpu-train:
    type: file
    machine: intel
    path: /home/noah/qwen-train-canary/canaries/wgpu/train.py
    source: canaries/wgpu/train.py
    mode: "0755"
    depends_on: [wgpu-dir]

  wgpu-reqs:
    type: file
    machine: intel
    path: /home/noah/qwen-train-canary/canaries/wgpu/requirements.txt
    source: canaries/wgpu/requirements.txt
    depends_on: [wgpu-dir]

  canary-dataset:
    type: file
    machine: intel
    path: /home/noah/qwen-train-canary/prompts/canary-dataset.yaml
    source: prompts/canary-dataset.yaml
    depends_on: [prompts-dir]

  # --- Verify Vulkan ---
  check-vulkan:
    type: task
    machine: intel
    command: "vulkaninfo --summary 2>/dev/null | head -5 || echo 'vulkaninfo not found'"
    completion_check: "vulkaninfo --summary 2>/dev/null | grep -qi 'device\\|gpu'"

policy:
  failure: stop_on_first
  lock_file: true
