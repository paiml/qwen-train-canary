- id: PMAT-475
  github_issue: 22
  item_type: task
  title: "NF4 kernel fusion — RMSNorm+GEMV, Gate+Up+SwiGLU for training throughput"
  status: in_progress
  priority: critical
  assigned_to: null
  created: 2026-04-03T00:00:00Z
  updated: 2026-04-03T00:00:00Z
  spec: null
  acceptance_criteria: []
  phases: []
  subtasks: []
  estimated_effort: null
  labels: []
  notes: null
  description: >
    APR training is 34x slower than unsloth (194 vs 6,628 tok/s). Root cause: memory
    bandwidth bound. Q4K fusions exist in trueno (FusedRmsNormGateUpSwigluQ4KKernel)
    but NF4 variants missing. Replicate Q4K fusion pattern for NF4 data type.
    Contracts: nf4-fused-rmsnorm-gemv-v1.yaml, nf4-fused-gate-up-swiglu-v1.yaml.
    Expected: 1.5x throughput improvement (194 → ~290 tok/s).
