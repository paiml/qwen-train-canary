      stderr for VRAM and loss patterns. Filed upstream: aprender#566.

  - id: PMAT-455
    title: "Trace APR NaN root cause ‚Äî trueno NF4 zeros V-projection weights"
    status: completed
    priority: critical
    description: >
      Diagnostic chain: apr profile (inference OK), apr trace stderr
      (11/196 tensors all-zero, all V-proj shape 256x1536), H-PARITY-001
      FALSIFIED (FP16 same NaN), H-PARITY-002 CONFIRMED (96% GPU without NF4).
      Filed: trueno#233, aprender#566. Contract: apr-training-parity-v1.yaml.

  - id: PMAT-456
    title: "Fix cuBLAS throughput_ratio upper bound (spec 0.95-1.05, was only >= 0.95)"
    status: completed
    priority: high
    github_issue: 14
    description: >
      score.py only checked lower bound. Added max_throughput_ratio=1.05.
      ratio=1.10 now correctly fails. 26 tests total.

  - id: PMAT-457
    title: "Fix APR canary throughput formula + baselines update"
    status: completed
    priority: critical
    github_issue: 15
    description: >
      Throughput formula only counted 1 epoch (under-reporting 8x for 100-step canary).
      Fixed: total_tokens = actual_steps * batch_size * seq_len. Baselines updated:
      tokens_per_sec 140‚Üí190, final_loss 200‚Üí20, peak_vram_mb added. Step profiler
      integration added (--profile-interval). 26 tests pass.

  - id: PMAT-458
    title: "FP16 cuBLAS GEMM training ‚Äî Tier 2 SHIPPED"
    status: completed
    priority: critical
    github_issue: 16
    description: >
      SHIPPED: Q/K/V dispatch (entrenar@82b484fa), cast kernel (trueno@05217c48),
      set_fp16_weights() (entrenar@de2ad7e1). All 7 projections wired for FP16.
      FINDING: FP16 dispatch was dead code until PMAT-470 implemented set_fp16_weights().
      Enable: FP16_GEMM=1. Next: measure actual throughput improvement.

  - id: PMAT-459
    title: "Gradient accumulation canary ‚Äî batch=1 accum=4 for yoga 8GB (PMAT-428)"
    status: completed
    priority: high
    github_issue: 17
    description: >
      F-EXEC-02 workaround: gradient accumulation enables effective batch=4 with
      batch=1 physical, reducing peak VRAM ~60%. pytorch canary now supports
      --gradient-accumulation-steps N. Contract: gradient-accumulation-canary-v1.yaml.

  - id: PMAT-462
    title: "Fix APR NaN-inflated throughput ‚Äî baseline PROVISIONAL, upstream norm_guard"
    status: completed
    priority: critical
    github_issue: 18
    description: >
      194 tok/s was inflated by NaN-skipped backward passes. Canary now tracks
      nan_backward_skips and valid_backward_steps. Baseline lowered to 40 tok/s
      (PROVISIONAL). Upstream fix: fused residual+RMSNorm in CudaNf4TransformerBlock
      (entrenar@b4d74f2c, entrenar#321). Eliminates activation explosion.

  - id: PMAT-463
    title: "Add nightly coverage ‚Äî apr-gx10, pytorch-gradacc-yoga"
    status: completed
    priority: high
    github_issue: 19
    description: >
      nightly.sh now covers all 5 runtimes on all hosts: yoga (unsloth, apr,
      pytorch-gradacc), gx10 (unsloth, pytorch, cublas, apr), intel (wgpu).
      pytorch@yoga baseline added (PROVISIONAL: 1500 tok/s estimate).

  - id: PMAT-464
    title: "CUDA graph capture for NF4 training ‚Äî Tier 3 UNBLOCKED"
    status: in_progress
    priority: critical
    github_issue: 20
    description: >
      Forward graph capture exists (entrenar@0138b409). cuBLAS workspace pre-allocated
      (PMAT-063, entrenar@de2ad7e1). Remaining: backward graph capture (840 kernels),
      graph update for seq_len changes. CUDA_GRAPH=1 to enable.

  - id: PMAT-467
    title: "Fix score.py NaN loss + PROVISIONAL handling + 7 new tests"
    status: completed
    priority: high
    github_issue: 21
    description: >
      NaN final_loss ‚Üí FAIL (was silent). PROVISIONAL surfaced in score output.
      Schema: APR must include nan_backward_skips. Makefile: apr-gx10 model path.
      33 tests (was 26). 16/16 results pass schema.

  - id: PMAT-470
    title: "FP16 weight storage + set_fp16_weights() ‚Äî Tier 2 COMPLETE"
    status: completed
    priority: critical
    github_issue: 16
    description: >
      SHIPPED: set_fp16_weights() implemented (entrenar@de2ad7e1, entrenar#324).
      Casts all 7 fp32 weight buffers to fp16 on GPU via CastF32ToF16Kernel.
      Forward dispatch now uses gemm_f16_to_f32 when FP16_GEMM=1.
      FINDING: FP16 GEMM path was DEAD CODE ‚Äî w_X_fp16 always None until this fix.

  - id: PMAT-471
    title: "CPU lm_head backward fallback for VRAM-constrained GPUs"
    status: completed
    priority: critical
    description: >
      SHIPPED: entrenar@de2ad7e1 (entrenar#323). On yoga 8GB, GPU embeddings
      (890 MB) don't fit after NF4 blocks (~4 GB). Without this fix, backward
      NEVER ran ‚Äî model could not train. CPU fallback: D2H + CPU matmul + H2D.

  - id: PMAT-063
    title: "cuBLAS workspace pre-allocation for CUDA graph capture"
    status: completed
    priority: critical
    description: >
      SHIPPED: entrenar@de2ad7e1 (entrenar#325). Pre-allocates 32 MB cuBLAS
      workspace before graph capture. Without this, CUDA graph capture fails
      on Ada (sm_89) with CUDA_ERROR_INVALID_VALUE.

  - id: PMAT-472
    title: "FP16 backward GEMM + drop fp32 weights ‚Äî free 2.6 GB VRAM"
    status: completed
    priority: critical
    description: >
      SHIPPED: entrenar@435e9762 (entrenar#326). gemm_f16_to_f32_backward_a for
      mixed-precision backward. All 7 backward GEMMs wired via fp16_dispatch.
      fp32 weights dropped after cast ‚Äî blocks shrink 5.2‚Üí2.6 GB. GPU embeddings
      now fit on yoga 8GB ‚Üí GPU lm_head backward ‚Üí CPU bottleneck eliminated.

  - id: PMAT-473
    title: "FP16 canary pipeline + provable contract + NaN scoring"
    status: completed
    priority: critical
    description: >
