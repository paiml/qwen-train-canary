roadmap_version: '1.0'
github_enabled: true
github_repo: paiml/qwen-train-canary
roadmap:
  - id: PMAT-439
    title: "Fix F-WL-06 falsification register — stale APR state (5 fixes → 15, learning)"
    status: completed
    priority: critical
    github_issue: 1
    description: >
      training-canary-spec.md F-WL-06 resolution shows 5-fix state and 36→123 tok/s.
      Actual: 15 fixes landed, pipeline IS LEARNING (loss 4.86→3.27), entrenar#316 FIXED.

  - id: PMAT-440
    title: "Fix optimization-roadmap P0 — 'loss stays at 11.93' contradicts pipeline learning"
    status: completed
    priority: critical
    github_issue: 2
    description: >
      optimization-roadmap.md P0 says loss=11.93 and #316 worked-around.
      Actual: loss 4.86→3.27, #316 FIXED, pipeline actively converging.

  - id: PMAT-441
    title: "Fix deployment-topology.md stale deferred-until notes (PMAT-424/431 both DONE)"
    status: completed
    priority: high
    github_issue: 3
    description: >
      Nightly pipeline prose says gx10/wgpu deferred until PMAT-424/431.
      Both are DONE. Also wgpu result host=mac-server vs spec intel.

  - id: PMAT-442
    title: "Update wgpu baseline threshold from 100 to measured 6,730 tok/s (Qwen-sized synthetic)"
    status: completed
    priority: high
    github_issue: 4
    description: >
      Section 5 wgpu baseline is 100 tok/s (pre-measurement estimate).
      Measured 6,730 tok/s on Qwen-sized (hidden=1536, vocab=32000) synthetic WGPU canary.

  - id: PMAT-443
    title: "Fix falsification register duplicates — conditions in both Active and Falsified tables"
    status: completed
    priority: high
    github_issue: 5
    description: >
      F-EXEC-02, F-HW-01, F-WL-03 appear in both Active Conditions and Falsified Claims.
      F-HW-02, F-WL-05, F-WL-01, F-WL-02 are confirmed by data but still listed Active.

  - id: PMAT-444
    title: "Validate F-MET-01 — canary metrics schema validation"
    status: completed
    priority: critical
    description: >
      F-MET-01 TRIGGERED then FIXED: wgpu missing timestamp. Schema validator built,
      11/11 results pass. Contract: canary-metrics-schema-v1.yaml.

  - id: PMAT-445
    title: "Validate F-SC-01 — score-gate logic correctness"
    status: completed
    priority: critical
    description: >
      F-SC-01 CONFIRMED: 5 falsification injection tests pass. 15% slowdown→FAIL,
      5% variance→PASS, 10% VRAM→FAIL, cuBLAS div→FAIL, cuBLAS ratio→FAIL.

  - id: PMAT-446
    title: "Fix baselines.json — wgpu 100→6600, add pytorch-compile entry"
    status: completed
    priority: high
    description: >
      baselines.json wgpu updated to 6,600 tok/s. pytorch-compile entry added.
      DEFAULT_BASELINES synced. F-BASE-001/002 satisfied.

  - id: PMAT-447
    title: "Confirm F-WL-04 — cuBLAS TF32 meaningful (ratio=1.0043)"
    status: completed
    priority: high
    github_issue: 8
    description: >
      throughput_ratio=1.0043 on gx10, not 1.0000. TF32 IS effective.
      Active Conditions reduced to 1 (F-EXEC-01 only).

  - id: PMAT-448
    title: "Fix nightly.sh — add canary-apr, canary-unsloth-gx10, unblock WGPU"
    status: completed
    priority: critical
    github_issue: 9
    description: >
      nightly.sh was missing apr on yoga, unsloth-gx10, and WGPU was
      still blocked. All three added. Default mode changed to all.

  - id: PMAT-449
    title: "Fix schema enum — add apr, pytorch-compile to spec Section 4"
    status: completed
    priority: high
    github_issue: 10
    description: >
      Spec Section 4 enum was "unsloth|pytorch|cublas|wgpu" but actual
      values include apr and pytorch-compile. Fixed.

  - id: PMAT-450
    title: "Create test infrastructure — 23 pytest tests"
    status: completed
    priority: high
    description: >
      tests/test_scoring.py: 13 tests implementing canary-score-gate-v1.yaml.
      tests/test_schema.py: 10 tests implementing canary-metrics-schema-v1.yaml.
      Makefile: make test target added.

  - id: PMAT-451
    title: "Fix score.py VRAM handling — skip when baseline omits peak_vram_mb"
    status: completed
    priority: high
    github_issue: 11
    description: >
      apr and wgpu baselines lack peak_vram_mb. score.py was defaulting to
      float('inf') which silently passes. Now skips VRAM check when baseline
      omits it. 2 new tests added (25 total).

  - id: PMAT-452
    title: "Validate F-EXEC-01 — inject GPU throttle, verify scoring detects regression"
    status: completed
    priority: critical
    github_issue: null
    description: >
      GPU clock injection test on gx10. Throttled to 600 MHz.
      Measured 7,325 tok/s vs 13,600 baseline = 46% regression.
      Scoring returned FAIL. LAST active condition — all 15 resolved.

  - id: PMAT-453
    title: "Fix APR canary timeout + backend field + collect fresh gx10 results"
    status: completed
    priority: high
    github_issue: 12
    description: >
      APR timeout 1200s → 7200s (needs ~5000s at 42 tok/s). APR backend
      'auto' → 'cuda' in JSON output. Fresh gx10 results: unsloth 16,118 tok/s,
      pytorch 4,017, cublas 0.000 divergence.

  - id: PMAT-454
    title: "Fix APR metrics quality — parse VRAM/loss from stderr, file upstream"
    status: completed
    priority: high
    github_issue: 13
    description: >
      APR canary had final_loss=0, peak_vram_mb=0 because apr finetune
      doesn't emit structured training metrics. Fixed wrapper to parse
      stderr for VRAM and loss patterns. Filed upstream: aprender#566.

  - id: PMAT-455
    title: "Trace APR NaN root cause — trueno NF4 zeros V-projection weights"
    status: completed
    priority: critical
    description: >
      Diagnostic chain: apr profile (inference OK), apr trace stderr
      (11/196 tensors all-zero, all V-proj shape 256x1536), H-PARITY-001
      FALSIFIED (FP16 same NaN), H-PARITY-002 CONFIRMED (96% GPU without NF4).
      Filed: trueno#233, aprender#566. Contract: apr-training-parity-v1.yaml.

  - id: PMAT-456
    title: "Fix cuBLAS throughput_ratio upper bound (spec 0.95-1.05, was only >= 0.95)"
    status: completed
    priority: high
    github_issue: 14
    description: >
      score.py only checked lower bound. Added max_throughput_ratio=1.05.
      ratio=1.10 now correctly fails. 26 tests total.

  - id: PMAT-457
    title: "Fix APR canary throughput formula + baselines update"
    status: completed
    priority: critical
    github_issue: 15
    description: >
      Throughput formula only counted 1 epoch (under-reporting 8x for 100-step canary).
      Fixed: total_tokens = actual_steps * batch_size * seq_len. Baselines updated:
      tokens_per_sec 140→190, final_loss 200→20, peak_vram_mb added. Step profiler
      integration added (--profile-interval). 26 tests pass.

  - id: PMAT-458
    title: "FP16 cuBLAS GEMM training — Tier 2 parity (194→390 tok/s)"
    status: in_progress
    priority: critical
    github_issue: 16
    description: >
      Memory-BW bound at 194 tok/s with fp32 GEMM. FP16 halves traffic: 9.4→4.7 MB/GEMM.
      Contract: fp16-cublas-gemm-v1.yaml (3 hypotheses, roofline analysis).
      Upstream: entrenar#320 (CudaFp16TransformerBlock), trueno#235 (cublasHgemm).
