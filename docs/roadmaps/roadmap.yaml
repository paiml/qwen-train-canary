- id: PMAT-477
  github_issue: 23
  item_type: task
  title: "Fix backward graph capture — move gradient clipping outside graph boundary"
  status: in_progress
  priority: critical
  assigned_to: null
  created: 2026-04-03T00:00:00Z
  updated: 2026-04-03T00:00:00Z
  spec: null
  acceptance_criteria: []
  phases: []
  subtasks: []
  estimated_effort: null
  labels: []
  notes: null
  description: >
    CUDA graph backward capture blocked by per-layer gradient clipping D2H sync.
    squared_sum_cuda() calls stream.synchronize() inside backward loop (168 sync
    points per backward pass). Fix: move clipping outside graph, compute norms in
    batch, single sync. Contract: cuda-graph-backward-v1.yaml.
