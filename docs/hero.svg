<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="bar-apr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="bar-unsloth" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="bar-pytorch" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar-cublas" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar-wgpu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
  </defs>

  <rect width="800" height="320" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="30" y="35" fill="#e6edf3" font-size="16" font-weight="bold">qwen-train-canary</text>
  <text x="230" y="35" fill="#7d8590" font-size="13">Fine-tuning throughput across 5 runtimes (tok/s)</text>

  <!-- Scale line -->
  <line x1="200" y1="50" x2="200" y2="290" stroke="#30363d" stroke-width="1"/>
  <line x1="200" y1="290" x2="770" y2="290" stroke="#30363d" stroke-width="1"/>

  <!-- Scale labels -->
  <text x="200" y="305" fill="#7d8590" font-size="10" text-anchor="middle">0</text>
  <text x="342" y="305" fill="#7d8590" font-size="10" text-anchor="middle">4k</text>
  <text x="485" y="305" fill="#7d8590" font-size="10" text-anchor="middle">8k</text>
  <text x="627" y="305" fill="#7d8590" font-size="10" text-anchor="middle">12k</text>
  <text x="770" y="305" fill="#7d8590" font-size="10" text-anchor="middle">16k</text>

  <!-- Grid lines -->
  <line x1="342" y1="50" x2="342" y2="290" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>
  <line x1="485" y1="50" x2="485" y2="290" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>
  <line x1="627" y1="50" x2="627" y2="290" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>

  <!-- apr (Rust/entrenar) — training in progress, showing adapter init -->
  <text x="190" y="78" fill="#f97316" font-size="12" text-anchor="end">apr</text>
  <text x="190" y="90" fill="#7d8590" font-size="9" text-anchor="end">entrenar (Rust)</text>
  <rect x="200" y="68" width="8" height="22" rx="3" fill="url(#bar-apr)" opacity="0.4"/>
  <text x="215" y="83" fill="#f97316" font-size="10">training in progress</text>

  <!-- unsloth yoga -->
  <text x="190" y="125" fill="#22c55e" font-size="12" text-anchor="end">unsloth</text>
  <text x="190" y="137" fill="#7d8590" font-size="9" text-anchor="end">yoga (8GB)</text>
  <rect x="200" y="115" width="239" height="22" rx="3" fill="url(#bar-unsloth)"/>
  <text x="445" y="130" fill="#e6edf3" font-size="11" font-weight="bold">6,697</text>

  <!-- unsloth gx10 -->
  <text x="190" y="170" fill="#22c55e" font-size="12" text-anchor="end">unsloth</text>
  <text x="190" y="182" fill="#7d8590" font-size="9" text-anchor="end">gx10 (120GB)</text>
  <rect x="200" y="160" width="487" height="22" rx="3" fill="url(#bar-unsloth)"/>
  <text x="693" y="175" fill="#e6edf3" font-size="11" font-weight="bold">13,660</text>

  <!-- pytorch gx10 -->
  <text x="190" y="215" fill="#3b82f6" font-size="12" text-anchor="end">pytorch</text>
  <text x="190" y="227" fill="#7d8590" font-size="9" text-anchor="end">gx10 (120GB)</text>
  <rect x="200" y="205" width="145" height="22" rx="3" fill="url(#bar-pytorch)"/>
  <text x="350" y="220" fill="#e6edf3" font-size="11" font-weight="bold">4,055</text>

  <!-- cublas gx10 (parity: 0.000 divergence) -->
  <text x="190" y="260" fill="#8b5cf6" font-size="12" text-anchor="end">cublas</text>
  <text x="190" y="272" fill="#7d8590" font-size="9" text-anchor="end">gx10 (parity)</text>
  <rect x="200" y="250" width="144" height="22" rx="3" fill="url(#bar-cublas)"/>
  <text x="350" y="265" fill="#e6edf3" font-size="11" font-weight="bold">4,027</text>
  <text x="405" y="265" fill="#a78bfa" font-size="9">divergence: 0.000</text>

  <!-- wgpu intel -->
  <text x="95" y="78" fill="#ef4444" font-size="12" text-anchor="end">wgpu</text>
  <text x="95" y="90" fill="#7d8590" font-size="9" text-anchor="end">intel (Vulkan)</text>
  <rect x="100" y="68" width="1" height="22" rx="1" fill="url(#bar-wgpu)" opacity="0"/>
  <!-- wgpu shown separately at bottom right -->
  <rect x="560" y="68" width="2" height="0" rx="1" fill="url(#bar-wgpu)"/>

  <!-- wgpu badge -->
  <rect x="560" y="56" width="200" height="40" rx="6" fill="#1c1c1c" stroke="#ef4444" stroke-width="1"/>
  <text x="570" y="72" fill="#ef4444" font-size="11" font-weight="bold">wgpu/burn (Vulkan)</text>
  <text x="570" y="87" fill="#7d8590" font-size="10">6,730 tok/s @ hidden=1536</text>
</svg>
